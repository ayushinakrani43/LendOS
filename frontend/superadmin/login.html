<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — LendOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f4f7f8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-box { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 32px; width: 100%; max-width: 360px; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    label { font-size: 12px; font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
    input { width: 100%; height: 40px; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 0 12px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
    button { width: 100%; height: 42px; background: #1b5068; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    #err { color: #dc2626; font-size: 12.5px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-title">Super Admin</div>
    <div class="login-sub">LendOS platform administration</div>
    <label>Email</label>
    <input type="email" id="email"/>
    <label>Password</label>
    <input type="password" id="password"/>
    <button onclick="login()">Sign In</button>
    <div id="err"></div>
  </div>
  <script>
    const API = 'http://localhost:8000';
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      errEl.style.display = 'none';
      try {
        const res = await fetch(`${API}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed.');
        localStorage.setItem('admin_token', data.access_token);
        localStorage.setItem('admin_name', data.full_name);
        window.location.href = '/admin/overview';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
